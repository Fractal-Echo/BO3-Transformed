# BO3 Vulkan experiment DXVK config.
#
# Keep this conservative. The first job is measuring frametime stability, not
# chasing benchmark screenshots with five variables changing at once.

# Show useful live state during test runs.
dxvk.hud = version,fps,frametimes,compiler

# Keep per-run logs for artifact review.
dxvk.logLevel = info

# Prefer low queue depth while testing input feel and stutter.
dxgi.maxFrameLatency = 1

# Let DXVK decide compiler thread count for the host. Override only when a
# platform profile proves this is wrong.
dxvk.numCompilerThreads = 0

# Do not force feature downgrade during baseline tests.
d3d11.maxFeatureLevel = 11_1

# Keep sync behavior app/default driven at first.
dxgi.syncInterval = -1

# Avoid experimental shortcut flags in the shared baseline profile.
d3d11.relaxedBarriers = False
d3d11.relaxedGraphicsBarriers = False

